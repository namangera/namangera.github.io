---
layout: default
---

<style>
  .post-back {
    font-size: 13px;
    color: #555;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    display: inline-block;
    margin-bottom: 40px;
  }
  .post-back:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }

  .post-header { margin-bottom: 32px; }

  .post-header h2 {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .post-byline {
    font-size: 12px;
    color: #aaa;
    font-weight: 300;
  }

  .post-content p {
    margin-bottom: 20px;
    font-weight: 300;
  }

  .post-content h2,
  .post-content h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 36px 0 12px;
    letter-spacing: 0.01em;
  }

  .post-content a {
    color: #1a1a1a;
    border-bottom: 1px solid #ccc;
    text-decoration: none;
  }

  .post-content a:hover { border-bottom-color: #1a1a1a; }

  .post-content ul,
  .post-content ol {
    padding-left: 20px;
    margin-bottom: 20px;
    font-weight: 300;
  }

  .post-content li { margin-bottom: 4px; }

  .post-content blockquote {
    border-left: 2px solid #d4d4d4;
    padding-left: 16px;
    color: #888;
    font-weight: 300;
    margin: 20px 0;
  }

  .post-content pre {
    background: #f0f0f0;
    border: 1px solid #e0e0e0;
    padding: 16px 18px;
    font-size: 12px;
    line-height: 1.7;
    overflow-x: auto;
    margin: 20px 0;
    color: #1a1a1a;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
  }

  .post-content code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: #f0f0f0;
    padding: 1px 5px;
    font-weight: 400;
  }

  .post-content pre code {
    background: none;
    padding: 0;
    font-size: 12px;
  }
</style>

<a href="/" class="post-back">← back</a>

<div class="post-header">
  <h2>{{ page.title }}</h2>
  <div class="post-byline">{{ page.date | date: "%B %Y" }} · {{ page.category }}</div>
</div>

<div class="post-content">
  {{ content }}
</div>
