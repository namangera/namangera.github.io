---
layout: default
---

<style>
  .post-back {
    font-size: 15px;
    color: #5a4a35;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    display: inline-block;
    margin-bottom: 40px;
  }
  .post-back:hover { border-bottom-color: #5a4a35; }

  .post-header { margin-bottom: 36px; }

  .post-header h2 {
    font-size: 28px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .post-byline {
    font-size: 15px;
    color: #9a8a75;
    font-style: italic;
  }

  .post-content p { margin-bottom: 22px; }

  .post-content h2,
  .post-content h3 {
    font-size: 20px;
    font-weight: 500;
    margin: 36px 0 14px;
  }

  .post-content a {
    color: #2a2218;
    border-bottom: 1px solid #9a8a75;
    text-decoration: none;
  }

  .post-content a:hover { border-bottom-color: #2a2218; }

  .post-content ul,
  .post-content ol {
    padding-left: 24px;
    margin-bottom: 22px;
  }

  .post-content li { margin-bottom: 6px; }

  .post-content blockquote {
    border-left: 3px solid #c8b99a;
    padding-left: 20px;
    color: #7a6a55;
    font-style: italic;
    margin: 24px 0;
  }

  .post-content pre,
  .post-content code {
    font-family: 'JetBrains Mono', monospace;
  }

  .post-content pre {
    background: #ede7d8;
    border: 1px solid #c8b99a;
    border-left: 3px solid #9a8a75;
    padding: 18px 20px;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
    margin: 24px 0;
    color: #2a2218;
  }

  .post-content code {
    font-size: 14px;
    background: #ede7d8;
    padding: 2px 6px;
  }

  .post-content pre code {
    background: none;
    padding: 0;
    font-size: 13px;
  }
</style>

<a href="/" class="post-back">← Back</a>

<div class="post-header">
  <h2>{{ page.title }}</h2>
  <div class="post-byline">
    {{ page.date | date: "%B %Y" }} · {{ page.category }}
  </div>
</div>

<div class="post-content">
  {{ content }}
</div>
